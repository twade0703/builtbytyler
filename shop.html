<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop · BuiltByTyler</title>
  <meta name="description" content="Browse products designed and built by Tyler Wade.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">

  <!-- Three.js — the immersive 3D depth layer (immersive.js) -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <header id="site-nav"></header>

  <main>
    <section class="section section--tight">
      <div class="container section-head reveal">
        <p class="eyebrow">The collection</p>
        <h2>Shop</h2>
        <p>Each piece is designed and built by hand. Browse the work below, then choose a
          configured <a href="#packages">build package</a> to order.</p>
      </div>
    </section>

    <section class="section--tight">
      <div class="container">
        <div class="product-grid" id="shop-grid"></div>
      </div>
    </section>

    <!-- Build packages — the orderable configurations, with prices -->
    <section class="section section--alt" id="packages">
      <div class="container">
        <div class="section-head reveal">
          <p class="eyebrow">Build packages</p>
          <h2>Configured builds, ready to order</h2>
          <p>Every build is made to order and tuned by hand. Pick a package below, or
            request a fully custom build.</p>
        </div>
        <div class="package-grid" id="packages-grid"></div>
      </div>
    </section>
  </main>

  <footer id="site-footer" data-year="2026"></footer>

  <script src="assets/js/products.js"></script>
  <script src="assets/js/components.js"></script>
  <script src="assets/js/hologram.js"></script>
  <script src="assets/js/main.js"></script>
  <script type="module" src="assets/js/immersive.js"></script>
</body>
</html>
